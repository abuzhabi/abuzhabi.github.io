<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Alpha-Seeker 证券研究系统</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--text:#c9d1d9;--text2:#8b949e;--accent:#f78166;--border:#30363d;--blue:#58a6ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:40px 20px}
.header{text-align:center;padding:60px 0 40px}
.header h1{font-size:2.2rem;margin-bottom:10px;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text2);font-size:1.1rem;margin-top:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:30px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:30px;text-decoration:none;color:var(--text);transition:all .2s}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card h3{font-size:1.3rem;margin-bottom:8px}
.card p{color:var(--text2);font-size:0.9rem}
.card .icon{font-size:2rem;margin-bottom:12px}
.footer{text-align:center;padding:40px;color:var(--text2);font-size:0.8rem}
</style></head><body><div class="container">
<div class="header"><h1>Alpha-Seeker 证券研究系统</h1><p>基于 Research Constitution V-2.2 框架的结构化证券深度研究</p></div>
<div class="grid">
<a href="company_report/" class="card"><div class="icon">🏢</div><h3>公司深度研究</h3><p>上市公司深度分析报告，第0章公司分类→第10章最终结论</p></a>
<a href="industry_report/" class="card"><div class="icon">🏭</div><h3>行业研究</h3><p>行业框架分析报告，TAM、产业链、竞争格局、三情景</p></a>
</div>
<div class="footer"><p>Research Constitution V-2.2 | Evidence First | Living Research | 2026-07-21</p></div>
</div></body></html>
